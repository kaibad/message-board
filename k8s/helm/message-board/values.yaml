replicaCount: 2

image:
  repository: kailashbadu/flask-message-app
  pullPolicy: Always
  tag: v1.0.1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /
    port: 5000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 5000
  initialDelaySeconds: 20
  periodSeconds: 5
  failureThreshold: 3

service:
  type: NodePort
  port: 80
  targetPort: 5000

ingress:
  enabled: false

namespace: default

mysql:
  image: mysql
  tag: "8.0"
  database: flask_app
  user: flask
  rootPassword: root12345
  password: flask123
  storage: 1Gi
