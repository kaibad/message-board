services:
  flask:
    build:
      context: .
    image: flask-message-app
    container_name: flask_message_app
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: flask
      MYSQL_PASSWORD: flask123
      MYSQL_DB: flask_app
    depends_on:
      mysql:
        condition: service_healthy


  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root12345
      MYSQL_USER: flask
      MYSQL_PASSWORD: flask123
      MYSQL_DATABASE: flask_app
    volumes:
        - ./mysql_data:/var/lib/mysql
    ports:
      - "33076:3306"
    healthcheck:
        test: ["CMD","mysqladmin","ping","-h","localhost"]
        interval: 10s
        timeout: 5s
        retries: 5


  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: flask
      PMA_PASSWORD: flask123
    depends_on:
        - mysql


volumes:
  mysql_data:



